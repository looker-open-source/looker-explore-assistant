name: lookerbytecodeexploreassistantmcplb
description: "Load balancer with CORS support for Explore Assistant MCP"
defaultService: projects/combined-genai-bi/global/backendServices/exploreassistantmcpbackendservice
hostRules: []
pathMatchers: []
tests: []
# Add CORS policy at the URL map level
defaultRouteAction:
  corsPolicy:
    allowOrigins:
    - "*"
    allowMethods:
    - "GET"
    - "POST" 
    - "OPTIONS"
    allowHeaders:
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
    maxAge: 3600
    allowCredentials: false
