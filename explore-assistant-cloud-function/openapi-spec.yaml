swagger: '2.0'
info:
  title: Looker Explore Assistant MCP Server
  description: MCP Server for Looker Explore Assistant with CORS support
  version: 1.0.0
host: looker-explore-assistant-mcp-730192175971.us-central1.run.app
schemes:
  - https
produces:
  - application/json
consumes:
  - application/json
paths:
  /:
    options:
      summary: CORS preflight
      operationId: corsPreflight
      security: []  # No authentication required for OPTIONS
      responses:
        '200':
          description: CORS preflight response
          headers:
            Access-Control-Allow-Origin:
              type: string
            Access-Control-Allow-Methods:
              type: string
            Access-Control-Allow-Headers:
              type: string
    post:
      summary: Process explore assistant request
      operationId: processRequest
      security:
        - google_id_token: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
      responses:
        '200':
          description: Successful response
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security:
        - google_id_token: []
      responses:
        '200':
          description: Health status
securityDefinitions:
  google_id_token:
    type: oauth2
    authorizationUrl: ""
    flow: implicit
    x-google-issuer: "https://accounts.google.com"
    x-google-jwks_uri: "https://www.googleapis.com/oauth2/v3/certs"
